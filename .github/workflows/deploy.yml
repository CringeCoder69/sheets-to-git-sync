name: Deploy to Apps Script

on:
  push:
    branches: [main]

concurrency:
  group: clasp-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install clasp
        run: npm install -g @google/clasp@3.3.0

      - name: Write clasp credentials
        run: printf '%s' "$CLASPRC_JSON" > "$HOME/.clasprc.json"
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}

      - name: Write .clasp.json
        run: printf '%s' "$CLASP_JSON" > .clasp.json
        env:
          CLASP_JSON: ${{ secrets.CLASP_JSON }}

      - name: Push to Apps Script
        run: clasp push -f
