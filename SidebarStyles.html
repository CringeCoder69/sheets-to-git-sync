<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-size: 13px; color: #202124; }
  #app { padding: 12px; display: flex; flex-direction: column; gap: 12px; min-height: 100vh; }

  h1 { font-size: 14px; font-weight: 600; margin: 0; }
  p { margin: 0; }
  .muted { color: #5f6368; font-size: 12px; }
  a { color: #1a73e8; text-decoration: none; cursor: pointer; }
  a:hover { text-decoration: underline; }

  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-weight: 500; }
  textarea, input[type="text"] {
    width: 100%; font-family: inherit; font-size: 12px;
    border: 1px solid #dadce0; border-radius: 4px; padding: 6px 8px;
    resize: vertical;
  }
  textarea { min-height: 64px; }

  button.primary {
    background: #1a73e8; color: #fff; border: 0; border-radius: 4px;
    padding: 8px 12px; cursor: pointer; font-size: 13px; font-weight: 500;
  }
  button.primary:disabled { background: #c4d6f5; cursor: default; }

  .banner {
    background: #fce8e6; color: #b3261e; padding: 6px 8px;
    border-radius: 4px; font-size: 12px;
  }

  .header { display: flex; justify-content: space-between; align-items: center; }
  .header .actions { display: flex; gap: 10px; }

  .repo-list {
    display: flex; flex-direction: column; gap: 2px;
    max-height: calc(100vh - 160px); overflow-y: auto;
    border: 1px solid #dadce0; border-radius: 4px;
  }
  .repo-item {
    text-align: left; background: none; border: 0; padding: 6px 8px;
    cursor: pointer; border-bottom: 1px solid #f1f3f4;
    display: flex; flex-direction: column; gap: 2px;
  }
  .repo-item:last-child { border-bottom: 0; }
  .repo-item:hover { background: #f1f3f4; }
  .repo-item .full { font-weight: 500; }
  .repo-item .branch { font-size: 11px; color: #5f6368; }

  pre#dump {
    margin: 0;
    background: #f8f9fa;
    border: 1px solid #dadce0;
    border-radius: 4px;
    padding: 8px;
    font-family: 'Roboto Mono', Menlo, monospace;
    font-size: 11px;
    line-height: 1.4;
    max-height: 50vh;
    overflow: auto;
    white-space: pre-wrap;
    word-break: break-word;
  }
</style>
