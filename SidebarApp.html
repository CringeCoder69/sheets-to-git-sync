<script>
(function () {
  const state = {
    name: 'BOOT',
    hasPat: false,
    repoBinding: null,
    repos: null,
    repoFilter: '',
    branches: null,
    selectedBranch: null,
    commits: null,
    headSha: null,
    selectedSha: null,
    graphLoading: false,
    modal: null,
    modalError: null,
    committing: false,
    commitMessage: '',
    resetting: false,
    resetTarget: null,
    error: null,
  };

  const root = document.getElementById('app');

  function call(fn, ...args) {
    return new Promise((res, rej) =>
      google.script.run
        .withSuccessHandler(r => r.ok ? res(r.data) : rej(r.error))
        .withFailureHandler(rej)
        [fn](...args));
  }

  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function setState(patch) {
    Object.assign(state, patch);
    render();
  }

  function transition(name, patch) {
    setState(Object.assign({ name }, patch || {}));
    onEnter(name);
  }

  function bannerHtml() {
    return state.error ? '<div class="banner">' + esc(state.error) + '</div>' : '';
  }

  function render() {
    if (state.name === 'BOOT') return renderBoot();
    if (state.name === 'NEED_PAT') return renderNeedPat();
    if (state.name === 'NEED_REPO') return renderNeedRepo();
    if (state.name === 'READY') return renderReady();
  }

  function renderBoot() {
    root.innerHTML = '<p class="muted">Loading…</p>';
  }

  function renderNeedPat() {
    root.innerHTML = [
      bannerHtml(),
      '<h1>Connect GitHub</h1>',
      '<p class="muted">Paste a fine-grained personal access token with <b>Contents: Read &amp; Write</b> and <b>Metadata: Read</b> on the target repo.</p>',
      '<p class="muted"><a href="https://github.com/settings/personal-access-tokens/new" target="_blank" rel="noopener">Create token on GitHub →</a></p>',
      '<div class="field">',
      '  <label for="pat-input">Personal access token</label>',
      '  <textarea id="pat-input" placeholder="github_pat_..." spellcheck="false"></textarea>',
      '</div>',
      '<button class="primary" id="pat-save">Save</button>',
    ].join('');

    const input = document.getElementById('pat-input');
    const btn = document.getElementById('pat-save');
    btn.onclick = async () => {
      const value = (input.value || '').trim();
      if (!value) return;
      btn.disabled = true;
      try {
        await call('apiSavePat', value);
        transition('BOOT', { error: null });
      } catch (err) {
        setState({ error: (err && err.message) || 'Failed to save token' });
      } finally {
        btn.disabled = false;
      }
    };
    input.focus();
  }

  function renderNeedRepo() {
    const repos = state.repos;
    let body;
    if (repos === null) {
      body = '<p class="muted">Loading repos…</p>';
    } else if (repos.length === 0) {
      body = '<p class="muted">No repositories accessible with this token.</p>';
    } else {
      const filter = state.repoFilter.trim().toLowerCase();
      const visible = filter
        ? repos.filter(r => r.fullName.toLowerCase().indexOf(filter) !== -1)
        : repos;
      const items = visible.map((r, i) =>
        '<button class="repo-item" data-index="' + i + '">' +
          '<span class="full">' + esc(r.fullName) + '</span>' +
          '<span class="branch">' + esc(r.defaultBranch || '') + (r.private ? ' · private' : '') + '</span>' +
        '</button>'
      ).join('');
      body = [
        '<div class="field">',
        '  <input id="repo-filter" type="text" placeholder="Filter repos…" value="' + esc(state.repoFilter) + '">',
        '</div>',
        '<div class="repo-list" id="repo-list">' + (items || '<p class="muted" style="padding:8px">No matches.</p>') + '</div>',
      ].join('');

      setTimeout(() => {
        const filterEl = document.getElementById('repo-filter');
        if (filterEl) {
          filterEl.oninput = e => setState({ repoFilter: e.target.value });
          filterEl.focus();
          const len = filterEl.value.length;
          try { filterEl.setSelectionRange(len, len); } catch (_) {}
        }
        const list = document.getElementById('repo-list');
        if (list) {
          list.querySelectorAll('.repo-item').forEach(el => {
            el.onclick = () => {
              const idx = Number(el.getAttribute('data-index'));
              const repo = visible[idx];
              bindRepo(repo);
            };
          });
        }
      }, 0);
    }

    root.innerHTML = [
      bannerHtml(),
      '<h1>Choose repository</h1>',
      body,
    ].join('');
  }

  function renderReady() {
    const b = state.repoBinding || {};

    let branchHtml;
    if (state.branches === null) {
      branchHtml = '<p class="muted">Loading branches…</p>';
    } else if (state.branches.length === 0) {
      branchHtml = '<p class="muted">No branches in this repository.</p>';
    } else {
      const opts = state.branches.map(br =>
        '<option value="' + esc(br.name) + '"' +
        (br.name === state.selectedBranch ? ' selected' : '') +
        '>' + esc(br.name) + '</option>'
      ).join('');
      branchHtml = [
        '<div class="field">',
        '  <label for="branch-select">Branch</label>',
        '  <div class="row">',
        '    <select id="branch-select">' + opts + '</select>',
        '    <button class="secondary" id="branch-refresh">Refresh</button>',
        '  </div>',
        '</div>',
      ].join('');
    }

    const canCommit = state.branches && state.branches.length > 0 && state.selectedBranch && state.headSha;
    const actionsHtml = [
      '<div class="button-row">',
      '  <button class="primary" id="commit-btn"' + (canCommit ? '' : ' disabled') + '>Commit current sheet…</button>',
      '</div>',
    ].join('');

    root.innerHTML = [
      bannerHtml(),
      '<div class="header">',
      '  <h1>' + esc(b.owner + '/' + b.name) + '</h1>',
      '  <div class="actions">',
      '    <a id="unbind">Unbind</a>',
      '    <a id="signout">Sign out</a>',
      '  </div>',
      '</div>',
      branchHtml,
      renderGraphPlaceholderHtml(),
      actionsHtml,
      state.modal === 'commit' ? commitModalHtml() : '',
      state.modal === 'reset' ? resetModalHtml() : '',
    ].join('');

    document.getElementById('unbind').onclick = async () => {
      try {
        await call('apiUnbindRepo');
        transition('BOOT', resetAfterRepoChange());
      } catch (err) {
        setState({ error: (err && err.message) || 'Unbind failed' });
      }
    };
    document.getElementById('signout').onclick = async () => {
      try {
        await call('apiClearPat');
        transition('BOOT', resetAfterRepoChange());
      } catch (err) {
        setState({ error: (err && err.message) || 'Sign out failed' });
      }
    };

    const select = document.getElementById('branch-select');
    if (select) {
      select.onchange = e => {
        setState({ selectedBranch: e.target.value, commits: null, headSha: null, selectedSha: null });
        loadGraph();
      };
    }
    const refreshBtn = document.getElementById('branch-refresh');
    if (refreshBtn) {
      refreshBtn.onclick = () => {
        setState({ branches: null, selectedBranch: null, commits: null, headSha: null, selectedSha: null });
        loadBranches();
      };
    }

    const commitBtn = document.getElementById('commit-btn');
    if (commitBtn) {
      commitBtn.onclick = () => setState({
        modal: 'commit',
        modalError: null,
        commitMessage: '',
      });
    }

    if (state.modal === 'commit') wireCommitModal();
    if (state.modal === 'reset') wireResetModal();

    mountGraph();
  }

  function openResetModal(sha) {
    if (!sha) return;
    const commit = (state.commits || []).find(c => c.sha === sha);
    setState({
      selectedSha: sha,
      modal: 'reset',
      modalError: null,
      resetTarget: { ref: sha, sha: sha, message: commit ? commit.message : '' },
    });
  }

  function renderGraphPlaceholderHtml() {
    if (state.commits === null || state.graphLoading) {
      return '<div id="graph" class="graph"><p class="muted">Loading graph…</p></div>';
    }
    if (state.commits.length === 0) {
      return '<div id="graph" class="graph"><p class="muted">No commits on this branch yet.</p></div>';
    }
    return '<div id="graph" class="graph"></div>';
  }

  function mountGraph() {
    if (!state.commits || state.commits.length === 0) return;
    const container = document.getElementById('graph');
    if (!container) return;
    // Compact mode hides the inline commit messages, keeping the graph narrow.
    // The message is shown via a custom dot: a plain circle (matching the
    // default look) plus an SVG <title>, which the browser renders as a native
    // tooltip on hover — it never overflows the sidebar like GitgraphJS's own
    // SVG tooltip did. Providing renderDot also bypasses that built-in tooltip.
    const SVG_NS = 'http://www.w3.org/2000/svg';
    function formatDate(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      return isNaN(d.getTime()) ? iso : d.toLocaleString();
    }
    // raw is the backend commit ({ sha, message, author, date }); commit is the
    // GitgraphJS commit (used only for the dot styling).
    function renderDot(commit, raw) {
      const r = commit.style.dot.size;
      const g = document.createElementNS(SVG_NS, 'g');
      g.style.cursor = 'pointer';

      const circle = document.createElementNS(SVG_NS, 'circle');
      circle.setAttribute('cx', String(r));
      circle.setAttribute('cy', String(r));
      circle.setAttribute('r', String(r));
      circle.setAttribute('fill', commit.style.dot.color || '');
      if (raw.sha === state.selectedSha) {
        circle.setAttribute('stroke', '#1a73e8');   // accent, matches button.primary
        circle.setAttribute('stroke-width', '3');
      }
      g.appendChild(circle);

      // Two-line native tooltip: message, then author · hash · date.
      const meta = [];
      if (raw.author) meta.push(raw.author);
      meta.push(raw.sha.slice(0, 7));
      const date = formatDate(raw.date);
      if (date) meta.push(date);
      const title = document.createElementNS(SVG_NS, 'title');
      title.textContent = raw.message + '\n' + meta.join(' · ');
      g.appendChild(title);

      if (commit.onClick) g.addEventListener('dblclick', commit.onClick);
      return g;
    }
    const gitgraph = GitgraphJS.createGitgraph(container, {
      template: GitgraphJS.TemplateName.Metro,
      orientation: GitgraphJS.Orientation.Vertical,
      mode: GitgraphJS.Mode.Compact,
    });
    const branch = gitgraph.branch(state.selectedBranch || 'main');
    // Default Vertical renders the last-added commit at the top. Add oldest
    // first so the newest commit (branch tip) ends up on top, and the branch
    // label + HEAD tag attach to it.
    const ordered = state.commits.slice().reverse();
    for (let i = 0; i < ordered.length; i++) {
      const c = ordered[i];
      const isHead = (c.sha === state.headSha);
      const sha = c.sha;
      branch.commit({
        subject: c.message,
        hash: c.sha,
        author: c.author,
        tag: isHead ? 'HEAD' : undefined,
        renderDot: function (commit) { return renderDot(commit, c); },
        onClick: function () { openResetModal(sha); },
      });
    }
  }

  function commitModalHtml() {
    const errHtml = state.modalError
      ? '<div class="banner">' + esc(state.modalError) + '</div>'
      : '';
    const disableCommit = state.committing || !state.commitMessage.trim();
    return [
      '<div class="modal-backdrop">',
      '  <div class="modal">',
      '    <h2>Commit to <code>' + esc(state.selectedBranch || '') + '</code></h2>',
      errHtml,
      '    <div class="field">',
      '      <label for="commit-message">Message</label>',
      '      <textarea id="commit-message" placeholder="Describe the change…">' + esc(state.commitMessage) + '</textarea>',
      '    </div>',
      '    <div class="modal-actions">',
      '      <button class="secondary" id="commit-cancel"' + (state.committing ? ' disabled' : '') + '>Cancel</button>',
      '      <button class="primary" id="commit-confirm"' + (disableCommit ? ' disabled' : '') + '>',
                state.committing ? 'Committing…' : 'Commit',
      '      </button>',
      '    </div>',
      '  </div>',
      '</div>',
    ].join('');
  }

  function wireCommitModal() {
    const messageEl = document.getElementById('commit-message');
    const confirmBtn = document.getElementById('commit-confirm');
    const cancelBtn = document.getElementById('commit-cancel');

    if (messageEl) {
      messageEl.oninput = e => {
        state.commitMessage = e.target.value;
        confirmBtn.disabled = state.committing || !state.commitMessage.trim();
      };
      messageEl.focus();
      const len = messageEl.value.length;
      try { messageEl.setSelectionRange(len, len); } catch (_) {}
    }
    if (cancelBtn) {
      cancelBtn.onclick = () => {
        if (state.committing) return;
        setState({ modal: null, modalError: null, commitMessage: '' });
      };
    }
    if (confirmBtn) {
      confirmBtn.onclick = async () => {
        const msg = (state.commitMessage || '').trim();
        if (!msg) return;
        setState({ committing: true, modalError: null });
        try {
          await call('apiCommit', {
            branch: state.selectedBranch,
            expectedParentSha: state.headSha,
            message: msg,
          });
          setState({
            committing: false,
            modal: null,
            modalError: null,
            commitMessage: '',
            commits: null,
            headSha: null,
            selectedSha: null,
            error: null,
          });
          loadGraph();
        } catch (err) {
          setState({
            committing: false,
            modalError: (err && err.message) || 'Commit failed',
          });
        }
      };
    }
  }

  function resetModalHtml() {
    const t = state.resetTarget || {};
    const errHtml = state.modalError
      ? '<div class="banner">' + esc(state.modalError) + '</div>'
      : '';
    return [
      '<div class="modal-backdrop">',
      '  <div class="modal">',
      '    <h2>Reset to <code>' + esc((t.sha || '').slice(0, 7)) + '</code></h2>',
      errHtml,
      '    <p>' + esc((t.message || '').split('\n', 1)[0]) + '</p>',
      '    <div class="warning">Local sheet changes will be overwritten and cannot be recovered.</div>',
      '    <div class="modal-actions">',
      '      <button class="secondary" id="reset-cancel"' + (state.resetting ? ' disabled' : '') + '>Cancel</button>',
      '      <button class="primary" id="reset-confirm"' + (state.resetting ? ' disabled' : '') + '>',
                state.resetting ? 'Resetting…' : 'Reset',
      '      </button>',
      '    </div>',
      '  </div>',
      '</div>',
    ].join('');
  }

  function wireResetModal() {
    const confirmBtn = document.getElementById('reset-confirm');
    const cancelBtn = document.getElementById('reset-cancel');

    if (cancelBtn) {
      cancelBtn.onclick = () => {
        if (state.resetting) return;
        setState({ modal: null, modalError: null, resetTarget: null });
      };
    }
    if (confirmBtn) {
      confirmBtn.onclick = async () => {
        const target = state.resetTarget;
        if (!target || !target.ref) return;
        setState({ resetting: true, modalError: null });
        try {
          await call('apiCheckout', { ref: target.ref });
          // checkout creates no commit → graph history is unchanged, no reload needed
          setState({ resetting: false, modal: null, resetTarget: null, error: null });
        } catch (err) {
          setState({
            resetting: false,
            modalError: (err && err.message) || 'Reset failed',
          });
        }
      };
    }
  }

  async function bindRepo(repo) {
    try {
      await call('apiBindRepo', { owner: repo.owner, name: repo.name });
      transition('BOOT', resetAfterRepoChange());
    } catch (err) {
      setState({ error: (err && err.message) || 'Bind failed' });
    }
  }

  async function loadRepos() {
    try {
      const data = await call('apiListRepos');
      setState({ repos: data.repos, error: null });
    } catch (err) {
      try { await call('apiClearPat'); } catch (_) {}
      transition('NEED_PAT', {
        hasPat: false,
        repos: null,
        error: (err && err.message) || 'Failed to load repositories',
      });
    }
  }

  async function loadBranches() {
    try {
      const data = await call('apiListBranches');
      const branches = data.branches || [];
      const selected = branches.length ? branches[0].name : null;
      setState({
        branches: branches,
        selectedBranch: selected,
        commits: null,
        headSha: null,
        selectedSha: null,
        error: null,
      });
      if (selected) loadGraph();
    } catch (err) {
      setState({
        branches: [],
        selectedBranch: null,
        error: (err && err.message) || 'Failed to load branches',
      });
    }
  }

  async function loadGraph() {
    if (!state.selectedBranch) return;
    setState({ graphLoading: true, error: null });
    try {
      const data = await call('apiGetGraph', { branch: state.selectedBranch });
      setState({
        commits: data.commits || [],
        headSha: data.head || null,
        graphLoading: false,
      });
    } catch (err) {
      setState({
        commits: [],
        headSha: null,
        graphLoading: false,
        error: (err && err.message) || 'Failed to load graph',
      });
    }
  }

  async function bootstrap() {
    try {
      const data = await call('apiBootstrap');
      const { hasPat, repoBinding } = data;
      if (!hasPat) {
        transition('NEED_PAT', { hasPat: false, repoBinding: null });
      } else if (!repoBinding) {
        transition('NEED_REPO', { hasPat: true, repoBinding: null, repos: null, repoFilter: '' });
      } else {
        transition('READY', { hasPat: true, repoBinding: repoBinding });
      }
    } catch (err) {
      setState({ error: (err && err.message) || 'Bootstrap failed' });
    }
  }

  function resetAfterRepoChange() {
    return {
      error: null,
      repos: null,
      repoFilter: '',
      branches: null,
      selectedBranch: null,
      commits: null,
      headSha: null,
      selectedSha: null,
      graphLoading: false,
      modal: null,
      modalError: null,
      commitMessage: '',
      committing: false,
      resetting: false,
      resetTarget: null,
    };
  }

  function onEnter(name) {
    if (name === 'BOOT') bootstrap();
    else if (name === 'NEED_REPO' && state.repos === null) loadRepos();
    else if (name === 'READY' && state.branches === null) loadBranches();
  }

  render();
  onEnter('BOOT');
})();
</script>
